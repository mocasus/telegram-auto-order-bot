# ============================================================
# Telegram Auto Order Bot — Docker Compose
# ============================================================
version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-auto-order-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KLIKQRIS_API_KEY=${KLIKQRIS_API_KEY}
      - KLIKQRIS_MERCHANT_ID=${KLIKQRIS_MERCHANT_ID}
      - KLIKQRIS_MODE=${KLIKQRIS_MODE:-sandbox}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - CONFIG_PATH=/app/config.yaml
    volumes:
      # Mount file config dari host
      - ./config.yaml:/app/config.yaml:ro
      # Persist database
      - ./data:/app/data
    ports:
      # Webhook port (opsional, hanya jika webhook enabled)
      - "${WEBHOOK_PORT:-8443}:8443"
    networks:
      - bot-network

  # Optional: webhook server dengan nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: bot-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - bot
  #   networks:
  #     - bot-network

networks:
  bot-network:
    driver: bridge
