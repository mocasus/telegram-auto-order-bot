<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A86B"/>
      <stop offset="100%" stop-color="#00D68F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#0d1117"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="64"
        fill="none" stroke="#1a2332" stroke-width="2"/>

  <!-- ===== SHOPPING BAG ===== -->
  <g transform="translate(256, 248)">

    <!-- Bag body — clean trapezoid -->
    <path d="M-90,-80 L90,-80 L60,90 L-60,90 Z"
          fill="none" stroke="url(#greenGrad)" stroke-width="12"
          stroke-linejoin="round"/>

    <!-- Bag bottom — slightly thicker -->
    <line x1="-60" y1="90" x2="60" y2="90"
          stroke="url(#greenGrad)" stroke-width="14" stroke-linecap="round"/>

    <!-- Bag handle — elegant arch -->
    <path d="M-60,-80 C-60,-170 60,-170 60,-80"
          fill="none" stroke="url(#greenGrad)" stroke-width="12"
          stroke-linecap="round"/>

    <!-- QR finder integrated into handle — concentric squares as decorative handle caps -->
    <!-- Left handle cap (finder pattern) -->
    <rect x="-78" y="-155" width="36" height="36" rx="6"
          fill="none" stroke="#00A86B" stroke-width="5"/>
    <rect x="-70" y="-147" width="20" height="20" rx="4"
          fill="none" stroke="#00A86B" stroke-width="4"/>
    <rect x="-64" y="-141" width="8" height="8" rx="2"
          fill="#00A86B"/>

    <!-- Right handle cap (finder pattern) -->
    <rect x="42" y="-155" width="36" height="36" rx="6"
          fill="none" stroke="#00A86B" stroke-width="5"/>
    <rect x="50" y="-147" width="20" height="20" rx="4"
          fill="none" stroke="#00A86B" stroke-width="4"/>
    <rect x="56" y="-141" width="8" height="8" rx="2"
          fill="#00A86B"/>

    <!-- ===== QR DATA MODULES — sparse, deliberate grid inside bag ===== -->
    <!-- Row 1 -->
    <rect x="-60" y="-58" width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="-32" y="-58" width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>
    <rect x="-4"  y="-58" width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="24"  y="-58" width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="48"  y="-58" width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.5"/>

    <!-- Row 2 -->
    <rect x="-46" y="-38" width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>
    <rect x="-18" y="-38" width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="10"  y="-38" width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="38"  y="-38" width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>

    <!-- Row 3 — center row, slightly different pattern -->
    <rect x="-60" y="-18" width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="-32" y="-18" width="10" height="10" rx="2.5" fill="#00D68F"/>
    <rect x="-4"  y="-18" width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.5"/>
    <rect x="24"  y="-18" width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="48"  y="-18" width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.6"/>

    <!-- Row 4 -->
    <rect x="-46" y="2"   width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="-18" y="2"   width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>
    <rect x="10"  y="2"   width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="38"  y="2"   width="10" height="10" rx="2.5" fill="#00D68F"/>

    <!-- Row 5 -->
    <rect x="-60" y="22"  width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>
    <rect x="-32" y="22"  width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="-4"  y="22"  width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="24"  y="22"  width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.5"/>
    <rect x="48"  y="22"  width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>

    <!-- Row 6 -->
    <rect x="-46" y="42"  width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.6"/>
    <rect x="-18" y="42"  width="10" height="10" rx="2.5" fill="#00D68F"/>
    <rect x="10"  y="42"  width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.7"/>
    <rect x="38"  y="42"  width="10" height="10" rx="2.5" fill="#00A86B"/>

    <!-- Row 7 — near bottom -->
    <rect x="-60" y="62"  width="10" height="10" rx="2.5" fill="#00A86B"/>
    <rect x="-32" y="62"  width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.6"/>
    <rect x="-4"  y="62"  width="10" height="10" rx="2.5" fill="#00A86B" opacity="0.5"/>
    <rect x="24"  y="62"  width="10" height="10" rx="2.5" fill="#00D68F" opacity="0.7"/>
    <rect x="48"  y="62"  width="10" height="10" rx="2.5" fill="#00A86B"/>

  </g>

  <!-- Bottom accent line — subtle -->
  <line x1="156" y1="472" x2="356" y2="472"
        stroke="#00A86B" stroke-width="1.5" opacity="0.08"/>

</svg>
