<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26A5E4"/>
      <stop offset="100%" stop-color="#1a8fc9"/>
    </linearGradient>
    <linearGradient id="qrGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A86B"/>
      <stop offset="100%" stop-color="#00c97d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#ff8c5a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Outer ring accent -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="8,20" opacity="0.5"/>

  <!-- Shopping Cart (Telegram blue) - centered, slightly offset up -->
  <g transform="translate(175, 105)" filter="url(#glow)">
    <!-- Cart body -->
    <path d="M20 100 L140 100 L155 60 L15 60 Z" fill="url(#cartGrad)" opacity="0.9"/>
    <!-- Cart handle -->
    <path d="M15 60 L15 30 Q15 10 35 10 L120 10 Q140 10 140 30 L140 60" fill="none" stroke="url(#cartGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Wheels -->
    <circle cx="50" cy="115" r="15" fill="#0d1117" stroke="url(#cartGrad)" stroke-width="4"/>
    <circle cx="110" cy="115" r="15" fill="#0d1117" stroke="url(#cartGrad)" stroke-width="4"/>
    <!-- Cart details - items inside -->
    <rect x="30" y="65" width="25" height="20" rx="3" fill="#FF6B35" opacity="0.9"/>
    <rect x="60" y="62" width="20" height="23" rx="3" fill="#00A86B" opacity="0.9"/>
    <rect x="85" y="67" width="22" height="18" rx="3" fill="#26A5E4" opacity="0.9"/>
    <rect x="112" y="64" width="18" height="21" rx="3" fill="#FF6B35" opacity="0.9"/>
  </g>

  <!-- QR Code (green) - bottom right -->
  <g transform="translate(295, 290)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="90" rx="12" fill="#0d1117" stroke="url(#qrGrad)" stroke-width="3"/>
    <!-- QR pattern -->
    <!-- Top-left finder -->
    <rect x="6" y="6" width="16" height="16" rx="3" fill="url(#qrGrad)"/>
    <rect x="9" y="9" width="10" height="10" rx="2" fill="#0d1117"/>
    <rect x="12" y="12" width="4" height="4" rx="1" fill="url(#qrGrad)"/>
    <!-- Top-right finder -->
    <rect x="68" y="6" width="16" height="16" rx="3" fill="url(#qrGrad)"/>
    <rect x="71" y="9" width="10" height="10" rx="2" fill="#0d1117"/>
    <rect x="74" y="12" width="4" height="4" rx="1" fill="url(#qrGrad)"/>
    <!-- Bottom-left finder -->
    <rect x="6" y="68" width="16" height="16" rx="3" fill="url(#qrGrad)"/>
    <rect x="9" y="71" width="10" height="10" rx="2" fill="#0d1117"/>
    <rect x="12" y="74" width="4" height="4" rx="1" fill="url(#qrGrad)"/>
    <!-- Random QR modules -->
    <rect x="28" y="8" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="34" y="8" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="40" y="14" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="28" y="20" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="46" y="8" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="52" y="14" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="28" y="26" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="34" y="32" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="28" y="38" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="40" y="26" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="52" y="32" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="46" y="38" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="58" y="20" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="64" y="26" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="28" y="50" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="40" y="44" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="34" y="56" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="46" y="50" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="28" y="62" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="52" y="56" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="40" y="62" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="64" y="50" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="58" y="62" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="64" y="68" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="70" y="38" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <rect x="76" y="44" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="70" y="56" width="4" height="4" rx="1" fill="#00A86B" opacity="0.7"/>
    <rect x="76" y="62" width="4" height="4" rx="1" fill="#00A86B" opacity="0.5"/>
    <!-- QR center logo -->
    <rect x="37" y="37" width="16" height="16" rx="4" fill="#0d1117" stroke="url(#qrGrad)" stroke-width="1.5"/>
    <circle cx="45" cy="45" r="4" fill="url(#qrGrad)"/>
  </g>

  <!-- Bot icon (Telegram-style paper plane, orange accent) - top right area -->
  <g transform="translate(310, 160)" filter="url(#glow)">
    <!-- Bot circle -->
    <circle cx="40" cy="40" r="40" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <!-- Paper plane (Telegram style) -->
    <path d="M15 40 L45 25 L45 35 L25 38 L45 45 L45 55 Z" fill="url(#accentGrad)" opacity="0.95"/>
    <!-- Wifi/signal arcs -->
    <path d="M50 20 Q60 20 60 30" fill="none" stroke="#26A5E4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M50 14 Q65 14 68 30" fill="none" stroke="#26A5E4" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Bot "face" dots -->
    <circle cx="32" cy="35" r="3" fill="#8b949e"/>
    <circle cx="32" cy="45" r="3" fill="#8b949e"/>
    <!-- Pulse line -->
    <path d="M52 40 L56 35 L60 45 L64 35 L68 40" fill="none" stroke="#00A86B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Connecting lines between elements -->
  <g opacity="0.3">
    <!-- Cart to QR -->
    <path d="M250 210 Q280 240 295 290" fill="none" stroke="#00A86B" stroke-width="1.5" stroke-dasharray="4,6"/>
    <!-- Cart to Bot -->
    <path d="M280 175 Q300 200 310 200" fill="none" stroke="#26A5E4" stroke-width="1.5" stroke-dasharray="4,6"/>
    <!-- Bot to QR -->
    <path d="M350 200 Q360 230 340 290" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="4,6"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="120" cy="260" r="2" fill="#30363d" opacity="0.5"/>
  <circle cx="140" cy="240" r="1.5" fill="#30363d" opacity="0.4"/>
  <circle cx="100" cy="280" r="1.5" fill="#30363d" opacity="0.4"/>
  <circle cx="180" cy="380" r="2" fill="#30363d" opacity="0.5"/>
  <circle cx="400" cy="120" r="1.5" fill="#30363d" opacity="0.4"/>

  <!-- Bottom text -->
  <text x="256" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#c9d1d9" letter-spacing="2">
    TELEGRAM
  </text>
  <text x="256" y="465" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#8b949e">
    AUTO ORDER BOT
  </text>

  <!-- QRIS badge -->
  <rect x="196" y="478" width="120" height="22" rx="11" fill="#00A86B" opacity="0.15"/>
  <text x="256" y="494" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#00A86B">
    ⬡ QRIS READY
  </text>
</svg>